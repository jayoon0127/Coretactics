<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .page { display: none; width: 100vw; height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }
        canvas { display: block; touch-action: none; background: #1a1a1a; }
        #ui { position: fixed; bottom: 20px; left: 20px; display: flex; gap: 10px; }
        .btn { background: #444; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        #stats { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="p-main" class="page active">
        <h1>K-INFLUENCE FULL</h1>
        <button class="btn" onclick="send({type:'CREATE'})">방 만들기</button>
        <input type="text" id="rid-in" placeholder="방 코드">
        <button class="btn" onclick="send({type:'JOIN', rid:document.getElementById('rid-in').value})">참가</button>
    </div>

    <div id="p-lobby" class="page">
        <h2>대기실: <span id="room-id"></span></h2>
        <button id="start-btn" class="btn" onclick="send({type:'START', rid:curRid})">게임 시작</button>
    </div>

    <div id="p-game" class="page">
        <div id="stats">GOLD: <span id="g-val">0</span> | SCI: <span id="s-val">0</span></div>
        <canvas id="cvs"></canvas>
        <div id="ui">
            <button class="btn" onclick="buyUnit('INF')">보병(50G)</button>
            <button class="btn" onclick="buyUnit('TANK')">기갑(150G)</button>
        </div>
    </div>

<script>
    let ws = new WebSocket(location.origin.replace(/^http/, 'ws'));
    let curRid = null, myId = null, gameData = null, selected = [];
    const cvs = document.getElementById('cvs');
    const ctx = cvs.getContext('2d');

    function send(obj) { ws.send(JSON.stringify(obj)); }

    ws.onmessage = (e) => {
        const d = JSON.parse(e.data);
        if(d.type === 'JOINED') {
            curRid = d.rid; myId = d.isHost;
            document.getElementById('room-id').innerText = d.rid;
            if(!d.isHost) document.getElementById('start-btn').style.display = 'none';
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p-lobby').classList.add('active');
        }
        if(d.type === 'GAME_DATA') {
            gameData = d;
            if(document.getElementById('p-game').classList.contains('active') === false) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById('p-game').classList.add('active');
                cvs.width = window.innerWidth; cvs.height = window.innerHeight;
            }
            document.getElementById('g-val').innerText = Math.floor(d.players[Object.keys(d.players)[0]].gold);
        }
    };

    function render() {
        if(!gameData) return requestAnimationFrame(render);
        ctx.clearRect(0,0,cvs.width,cvs.height);
        const scale = Math.min(cvs.width/800, cvs.height/1200);
        ctx.save(); ctx.scale(scale, scale);

        // 영향력 맵
        gameData.influence.forEach((row, i) => {
            row.forEach((owner, j) => {
                if(owner) {
                    ctx.fillStyle = gameData.players[owner].color;
                    ctx.globalAlpha = 0.3;
                    ctx.fillRect(j*25, i*25, 25, 25);
                }
            });
        });

        // 유닛
        ctx.globalAlpha = 1.0;
        gameData.units.forEach(u => {
            ctx.fillStyle = gameData.players[u.owner].color;
            ctx.beginPath(); ctx.arc(u.x, u.y, u.type==='TANK'?15:10, 0, Math.PI*2); ctx.fill();
            if(u.penalty) { ctx.strokeStyle = 'red'; ctx.stroke(); }
            // HP 바
            ctx.fillStyle = 'red'; ctx.fillRect(u.x-10, u.y-20, 20, 4);
            ctx.fillStyle = 'lime'; ctx.fillRect(u.x-10, u.y-20, 20*(u.hp/u.maxHp), 4);
        });

        ctx.restore();
        requestAnimationFrame(render);
    }

    cvs.addEventListener('touchstart', (e) => {
        const scale = Math.min(cvs.width/800, cvs.height/1200);
        const tx = e.touches[0].clientX / scale; const ty = e.touches[0].clientY / scale;
        selected = gameData.units.filter(u => Math.sqrt((u.x-tx)**2 + (u.y-ty)**2) < 40).map(u => u.id);
    });

    cvs.addEventListener('touchend', (e) => {
        if(selected.length > 0) {
            const scale = Math.min(cvs.width/800, cvs.height/1200);
            const tx = e.changedTouches[0].clientX / scale; const ty = e.changedTouches[0].clientY / scale;
            send({ type: 'MOVE', rid: curRid, x: tx, y: ty, uids: selected });
        }
    });

    requestAnimationFrame(render);
</script>
</body>
</html>
